services:
  - type: web
    name: minecraft-for-beginners
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: PUBLIC_SITE_URL
        sync: false
      - key: ADSENSE_CLIENT
        sync: false
      - key: ADSENSE_SLOT_INLINE
        sync: false
      - key: ADSENSE_SLOT_SIDEBAR
        sync: false
